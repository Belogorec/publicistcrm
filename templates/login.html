<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — PUBLICIST CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='crm.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; margin: 0; font-family: 'IBM Plex Sans', sans-serif; }
    .login-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 40px; max-width: 400px; width: 100%; }
    .login-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; text-align: center; color: #222; }
    .login-subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 32px; }
    .login-step { margin-bottom: 24px; }
    .step-number { display: inline-block; width: 24px; height: 24px; background: #007bff; color: white; border-radius: 50%; text-align: center; line-height: 24px; font-weight: 600; font-size: 12px; margin-right: 8px; }
    .step-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; }
    .step-content { margin-left: 32px; font-size: 13px; line-height: 1.5; color: #555; }
    .code-box { background: #f8f8f8; border: 1px solid #ddd; border-radius: 4px; padding: 12px; font-family: 'Courier New', monospace; font-size: 18px; font-weight: 600; text-align: center; margin: 12px 0; letter-spacing: 2px; word-break: break-all; }
    .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .btn:hover { background: #0056b3; }
    .copy-btn { width: 100%; padding: 8px 12px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; }
    .error { background: #fee; color: #c00; padding: 10px; border-radius: 4px; font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-title">PUBLICIST — CRM</div>
    <div class="login-subtitle">Вход через Telegram</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    {% if show_request_code %}
    <form method="post" action="{{ url_for('request_auth_code') }}">
      <button type="submit" class="btn">Получить код для входа</button>
    </form>
    {% else %}
    <div class="login-step">
      <div class="step-title"><span class="step-number">1</span>Скопируйте код</div>
      <div class="step-content">
        <div class="code-box">{{ code }}</div>
        <button type="button" class="copy-btn" onclick="navigator.clipboard.writeText('{{ code }}')">Скопировать</button>
      </div>
    </div>
    <div class="login-step">
      <div class="step-title"><span class="step-number">2</span>Отправьте боту</div>
      <div class="step-content">
        <div>/auth {{ code }}</div>
        {% if bot_username %}<div style="margin-top:8px;"><a href="https://t.me/{{ bot_username }}" target="_blank">Открыть бота</a></div>{% endif %}
      </div>
    </div>
    <div class="login-step">
      <div class="step-title"><span class="step-number">3</span>Подтвердите вход</div>
      <div class="step-content">
        <form method="post" action="{{ url_for('confirm_auth_code_route') }}">
          <input type="hidden" name="code" value="{{ code }}">
          <button type="submit" class="btn">Проверить и войти</button>
        </form>
      </div>
    </div>
    {% endif %}
  </div>
</body>
</html>
